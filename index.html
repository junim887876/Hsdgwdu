<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Acesso Restrito</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
  body { background: #0a0a0a; color: #00ff00; font-family: monospace; padding: 20px; }
  #chat { display: none; }
  .box { border: 1px solid #333; padding: 20px; max-width: 450px; margin: 40px auto; background: #111; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
  input, button { width: 100%; padding: 12px; margin-top: 10px; background: #000; color: #0f0; border: 1px solid #333; box-sizing: border-box; border-radius: 4px; font-family: monospace; }
  input:focus { outline: none; border-color: #00ff00; }
  button { background: #00ff00; color: #000; cursor: pointer; font-weight: bold; margin-top: 15px; }
  button:hover { background: #00cc00; }
  #msgs { height: 350px; overflow-y: auto; border: 1px solid #222; padding: 15px; margin-top: 10px; background: #050505; border-radius: 4px; }
  p { margin: 8px 0; word-break: break-word; line-height: 1.4; }
  .meta { color: #555; font-size: 0.8em; }
  .usr { color: #00ff00; font-weight: bold; }
</style>
</head>
<body>

<div id="login" class="box">
  <h2 style="text-align:center; margin-top:0;">LOGIN</h2>
  <input type="text" id="usr" placeholder="Seu Nome de Usuário" autocomplete="off">
  <input type="password" id="pwd" placeholder="Senha de Criptografia" autocomplete="off">
  <button onclick="_0xL()">ACESSAR CHAT</button>
</div>

<div id="chat" class="box">
  <div id="msgs"></div>
  <input type="text" id="txt" placeholder="Escreva sua mensagem..." autocomplete="off" onkeypress="if(event.key==='Enter')_0xS()">
  <button onclick="_0xS()">ENVIAR</button>
</div>

<script>
/* CODIGO OFUSCADO E EMBARALHADO PARA SEGURANÇA E DIFICULTAR LEITURA */
const _0xU='https://docs.google.com/forms/d/e/1FAIpQLSdvYL9LIYnilwMbGXRNXVwGOASwRDdUeRPgwGr_j5ajfxBJAw/formResponse';
const _0xE='entry.1620030135';
const _0xC='https://docs.google.com/spreadsheets/d/1PzPJ_4Gh8wGB2iKaleJSREL0tgV80YcmCu1mOS15tRQ/export?format=csv';
let _k='',_u='';
function _0xL(){_u=document.getElementById('usr').value.trim();_k=document.getElementById('pwd').value.trim();
if(_u&&_k){document.getElementById('login').style.display='none';document.getElementById('chat').style.display='block';_0xR();setInterval(_0xR,4000);}}
function _0xS(){let m=document.getElementById('txt').value.trim();if(!m)return;document.getElementById('txt').value='';
let p=JSON.stringify({u:_u,m:m});let e=CryptoJS.AES.encrypt(p,_k).toString();let f=new FormData();f.append(_0xE,e);
fetch(_0xU,{method:'POST',mode:'no-cors',body:f}).then(()=>setTimeout(_0xR,800));}
async function _0xR(){try{let r=await fetch(_0xC);let c=await r.text();let w=c.split('\n').slice(1);let b=document.getElementById('msgs');
let isB=b.scrollHeight-b.scrollTop===b.clientHeight;b.innerHTML='';let n=new Date().getTime();let s6=6*60*60*1000;
w.forEach(_x=>{if(!_x)return;let _l=_x.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);if(!_l||_l.length<2)return;
let t=_l[0].replace(/(^"|"$)/g,'');let d=_l[1].replace(/(^"|"$)/g,'');let pt=t.split(' ');if(pt.length<2)return;
let dt=pt[0].split('/');let tm=pt[1].split(':');if(dt.length<3)return;let o=new Date(dt[2],dt[1]-1,dt[0],tm[0],tm[1],tm[2]);
if(n-o.getTime()<=s6){try{let db=CryptoJS.AES.decrypt(d,_k);let ds=db.toString(CryptoJS.enc.Utf8);if(ds){let jd=JSON.parse(ds);
let p=document.createElement('p');p.innerHTML=`<span class="meta">[${pt[1]}]</span> <span class="usr">${jd.u}:</span> ${jd.m}`;
b.appendChild(p);}}catch(e){}}});b.scrollTop=b.scrollHeight;}catch(e){}}
</script>

</body>
</html>
